<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>姓名婚姻分析 - 甄好運姓名學專用</title>
    <style>
        html { -webkit-text-size-adjust: none; text-size-adjust: none; }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f8f9fa; padding: 15px; text-align: center; color: #333; }
        .input-box { background: white; border: 1px solid #ddd; border-radius: 15px; padding: 20px; max-width: 450px; margin: 0 auto 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .name-group { margin-bottom: 15px; padding: 10px; border: 1px solid #eee; border-radius: 10px; }
        .name-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #800000; }
        input { width: 35%; padding: 12px; margin: 5px; text-align: center; font-size: 18px; border: 1px solid #ccc; border-radius: 8px; }
        button { width: 85%; padding: 14px; background-color: #800000; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:disabled { background-color: #bbb; cursor: not-allowed; }
        .result-container { display: flex; flex-wrap: nowrap; justify-content: center; gap: 10px; margin-top: 20px; width: 100%; }
        .result-frame { border: 2px solid maroon; border-radius: 15px; padding: 15px 5px; width: 100%; max-width: 320px; background-color: #FFFBFA; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: none; box-sizing: border-box; }
        .result-title { font-weight: bold; font-size: 18px; color: #800000; margin-bottom: 15px; }
        table { margin: 0 auto; border-collapse: collapse; width: 100%; table-layout: fixed; }
        .char-row { height: 60px; }
        .arrow-row { height: 45px; vertical-align: middle; }
        .arrow-row td { height: 45px; padding: 0; }
        
        .stroke-text { font-size: 13px; color: #aaa; width: 55px; text-align: right; padding-right: 12px; box-sizing: border-box; }
        .char-text { font-size: 18px; font-weight: bold; width: 45px; color: black; text-align: left; padding-left: 5px; box-sizing: border-box; }
        .num-text { font-size: 17px; color: #483D8B; width: 35px; text-align: center; }
        .wx-text { font-size: 15px; color: #483D8B; width: 30px; text-align: center; }
        .ge-label { font-size: 13px; color: #483D8B; font-weight: bold; width: 40px; text-align: left; }
        
        .total-box { font-size: 18px; color: darkred; font-weight: bold; margin-top: 15px; border-top: 1.5px solid #ddd; padding-top: 15px; }
        
        /* 新增的分析區塊樣式 */
        .analysis-box { max-width: 450px; margin: 20px auto; text-align: left; background: #fff; border: 1px solid #800000; border-radius: 10px; padding: 15px; box-sizing: border-box; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: none; }
        .analysis-box h3 { color: #800000; margin-top: 0; font-size: 18px; border-bottom: 2px solid #800000; padding-bottom: 5px; }
        .analysis-text { font-size: 15.5px; line-height: 1.6; color: #333; font-weight: bold; }
        
        #status { font-size: 13px; color: #888; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h2 style="margin-bottom: 5px; line-height: 1.2;">姓名婚姻分析</h2>
    <div style="font-size: 18px; color: #666; margin-bottom: 15px; font-weight: normal;">甄好運姓名學專用</div>
    <div id="status">正在同步字典數據...</div>

    <div class="input-box">
        <div class="name-group">
            <label>請輸入姓名</label>
            <input type="text" id="lName" placeholder="姓" maxlength="2">
            <input type="text" id="fName" placeholder="名" maxlength="4">
        </div>
        <button id="btnRun" onclick="analyzeName()" disabled>開始分析</button>
    </div>

    <div class="result-container">
        <div id="mResultFrame" class="result-frame">
            <div class="result-title">命盤格局</div>
            <table id="mResultTable"></table>
            <div id="mTotalBox" class="total-box"></div>
        </div>
    </div>
    
    <!-- 新增的分析結果區塊 -->
    <div id="analysisBox" class="analysis-box">
        <h3>婚姻宮分析結果</h3>
        <div id="analysisContent"></div>
    </div>

    <script>
        let dictionary = {};
        const btn = document.getElementById('btnRun');
        const status = document.getElementById('status');

        function getStrokes(char) {
            const customStrokes = {
                '互': 4, '片': 4, '氏': 4, '及': 4, '之': 4, '王': 4, '瓦': 5, '台': 5, '巡': 6, '卉': 6,
                '廷': 7, '初': 7, '秀': 7, '成': 7, '亞': 8, '武': 8, '昆': 8, '沛': 8, '牧': 8, '弢': 8, '去': 8, '幺': 8,
                '政': 9, '盈': 9, '建': 9, '妍': 9, '致': 9, '修': 9, '哲': 10, '卿': 10, '娜': 10, '育': 10,
                '屏': 11, '胡': 11, '強': 11, '迎': 11, '閏': 11, '一': 11, '弓': 11, '丿': 11,
                '傑': 12, '黃': 12, '盛': 12, '勝': 12, '為': 12, '能': 12, '胸': 12, '涵': 12,
                '溫': 13, '新': 13, '敬': 13, '雋': 13, '淵': 13, '郎': 14, '鳳': 14, '萍': 14, '慈': 14, '嘉': 14,
                '萬': 15, '興': 15, '霈': 15, '數': 15, '寬': 15, '豎': 15, '履': 15, '學': 16, '樺': 16, '璇': 16, '閣': 16, '潔': 16, '頤': 16,
                '鴻': 17, '臨': 17, '燦': 17, '戴': 18, '豐': 18, '珞': 18, '魏': 18, '蕭': 19, '覺': 19, '贊': 19, '羅': 20, '寶': 20, '藏': 20, '譽': 20, '馨': 20,
                '屬': 21, '龔': 22, '響': 22, '霽': 22, '蘭': 23, '麟': 23, '艷': 24
            };
            return customStrokes[char] || dictionary[char] || 0;
        }

        async function loadDict() {
            try {
                const files = ['slim_a.txt', 'slim_b.txt'];
                for (const file of files) {
                    const response = await fetch(file);
                    const data = await response.json();
                    for (let key in data) { dictionary[key] = data[key]; }
                }
                status.innerText = "✅ 字典已就緒";
                btn.disabled = false;
            } catch (err) { status.innerHTML = "❌ 字典載入異常"; }
        }
        loadDict();

        function reduceToSingleDigit(n) {
            while (n >= 10) { n = String(n).split('').reduce((sum, d) => sum + parseInt(d), 0); }
            return n;
        }

        function getWX(n) {
            const map = {1:"木", 2:"木", 3:"火", 4:"火", 5:"土", 6:"土", 7:"金", 8:"金", 9:"水", 0:"水"};
            return map[n % 10];
        }

        function getRelationInfo(up, down) {
            const getIdx = (n) => {
                const t = n % 10;
                if (t==1||t==2) return 0; if (t==3||t==4) return 1;
                if (t==5||t==6) return 2; if (t==7||t==8) return 3; return 4;
            };
            const u = getIdx(up), d = getIdx(down);
            if (u == d) return { type: "無", dir: "" };
            if ((u + 1) % 5 == d) return { type: "生", dir: "下" };
            if ((d + 1) % 5 == u) return { type: "生", dir: "上" };
            const ke = [0, 2, 4, 1, 3];
            const ui = ke.indexOf(u), di = ke.indexOf(d);
            if ((ui + 1) % 5 == di) return { type: "剋", dir: "下" };
            if ((di + 1) % 5 == ui) return { type: "剋", dir: "上" };
            return { type: "無", dir: "" };
        }

        function createArrowSvg(info) {
            if (info.type === "無") return `<svg width="30" height="35" style="display:block; margin:0 auto; visibility:hidden;"></svg>`;
            const head = info.type === "生" ? 
                (info.dir === "下" ? "M -4,-6 L 0,0 L 4,-6" : "M -4,6 L 0,0 L 4,6") :
                (info.dir === "下" ? "M -5,-8 L 5,-8 L 0,2 Z" : "M -5,8 L 5,8 L 0,-2 Z");
            const y = info.dir === "下" ? 30 : 5;
            return `<svg width="30" height="35" style="display:block; margin:0 auto;">
                <line x1="15" y1="5" x2="15" y2="30" stroke="red" stroke-width="1.2" />
                <path d="${head}" fill="${info.type === '生' ? 'none' : 'red'}" stroke="red" stroke-width="1.2" transform="translate(15,${y})" />
            </svg>`;
        }
        
        function createMiniArrowSvg(info) {
            if (info.type === "無") return `<svg width="20" height="20" style="display:block; margin:2px auto; visibility:hidden;"></svg>`;
            const head = info.type === "生" ? 
                (info.dir === "下" ? "M -3,-4 L 0,0 L 3,-4" : "M -3,4 L 0,0 L 3,4") :
                (info.dir === "下" ? "M -4,-5 L 4,-5 L 0,2 Z" : "M -4,5 L 4,5 L 0,-2 Z");
            const y = info.dir === "下" ? 18 : 2;
            return `<svg width="20" height="20" style="display:block; margin:2px auto;">
                <line x1="10" y1="2" x2="10" y2="18" stroke="red" stroke-width="1.2" />
                <path d="${head}" fill="${info.type === '生' ? 'none' : 'red'}" stroke="red" stroke-width="1.2" transform="translate(10,${y})" />
            </svg>`;
        }

        function getGirdData(lStr, fStr) {
            let lNameArr = [], fNameArr = [], lStrokes = [], fStrokes = [];
            
            if (/^\d{1,2}$/.test(lStr)) {
                lNameArr = [lStr];
                lStrokes = [parseInt(lStr)];
            } else {
                lNameArr = lStr.split('');
                lStrokes = lNameArr.map(c => getStrokes(c));
            }

            if (/^\d{4}$/.test(fStr)) {
                let n1 = parseInt(fStr.substring(0, 2));
                let n2 = parseInt(fStr.substring(2, 4));
                fNameArr = [fStr.substring(0, 2)];
                fStrokes = [n1];
                if (n2 !== 0) {
                    fNameArr.push(fStr.substring(2, 4));
                    fStrokes.push(n2);
                }
            } else {
                fNameArr = fStr.split('');
                fStrokes = fNameArr.map(c => getStrokes(c));
            }

            const lTotal = lStrokes.reduce((a, b) => a + b, 0);
            const tian = lStrokes.length === 1 ? lStrokes[0] + 1 : lTotal;
            const ren = lTotal + fStrokes[0];
            const di = fStrokes.length === 1 ? fStrokes[0] + 1 : fStrokes[0] + fStrokes[1];
            const zong = lTotal + fStrokes.reduce((a, b) => a + b, 0);

            return { lNameArr, fNameArr, lStrokes, fStrokes, tian, ren, di, zong };
        }

        function buildTableHtml(data, renWx, diWx, marriageRel) {
            let html = "";
            
            const palaceHtml = `
                <div style="position:absolute; right:35px; top:50%; transform:translateY(-50%); font-size:15px; font-weight:bold; color:#800000; line-height:1; text-align:center;">
                    <div>${renWx}</div>
                    ${createMiniArrowSvg(marriageRel)}
                    <div>${diWx}</div>
                </div>`;

            if (data.lStrokes.length === 1) {
                html += `<tr class="char-row"><td class="stroke-text">${data.lStrokes[0]}</td><td class="char-text">${data.lNameArr[0]}</td><td class="num-text">${data.tian}</td><td class="wx-text">${getWX(data.tian)}</td><td class="ge-label">天格</td></tr>`;
            } else {
                html += `<tr class="char-row"><td class="stroke-text">${data.lStrokes[0]}</td><td class="char-text">${data.lNameArr[0]}</td><td></td><td></td><td></td></tr>`;
                html += `<tr class="char-row"><td class="stroke-text">${data.lStrokes[1]}</td><td class="char-text">${data.lNameArr[1]}</td><td class="num-text">${data.tian}</td><td class="wx-text">${getWX(data.tian)}</td><td class="ge-label">天格</td></tr>`;
            }
            
            html += `<tr class="arrow-row"><td></td><td></td><td></td><td>${createArrowSvg(getRelationInfo(data.tian, data.ren))}</td><td></td></tr>`;
            
            html += `<tr class="char-row"><td class="stroke-text">${data.fStrokes[0]}</td><td class="char-text">${data.fNameArr[0]}</td><td class="num-text">${data.ren}</td><td class="wx-text">${getWX(data.ren)}</td><td class="ge-label">人格</td></tr>`;
            
            html += `<tr class="arrow-row"><td></td><td></td><td></td><td>${createArrowSvg(getRelationInfo(data.ren, data.di))}</td><td></td></tr>`;
            
            if (data.fStrokes.length > 1) {
                html += `<tr class="char-row"><td class="stroke-text" style="position:relative;">${palaceHtml}${data.fStrokes[1]}</td><td class="char-text">${data.fNameArr[1]}</td><td class="num-text">${data.di}</td><td class="wx-text">${getWX(data.di)}</td><td class="ge-label">地格</td></tr>`;
            } else {
                html += `<tr class="char-row"><td class="stroke-text" style="position:relative;">${palaceHtml}1</td><td></td><td class="num-text">${data.di}</td><td class="wx-text">${getWX(data.di)}</td><td class="ge-label">地格</td></tr>`;
            }
            return html;
        }

        function analyzeName() {
            const data = getGirdData(document.getElementById('lName').value.trim(), document.getElementById('fName').value.trim());

            const renD = reduceToSingleDigit(data.ren);
            const diD = reduceToSingleDigit(data.di);

            const renWx = getWX(renD);
            const diWx = getWX(diD);

            const marriageRel = getRelationInfo(renD, diD);

            document.getElementById('mResultTable').innerHTML = buildTableHtml(data, renWx, diWx, marriageRel);
            document.getElementById('mTotalBox').innerText = "總格 ： " + data.zong;
            document.getElementById('mResultFrame').style.display = "block";
            
            // --- 處理婚姻宮分析文字 ---
            const analysisBox = document.getElementById('analysisBox');
            const analysisContent = document.getElementById('analysisContent');
            let analysisHtml = "";

            if (marriageRel.type === "剋") {
                let detailText = "";
                // 判斷五行組合 (不分上下方向)
                if ((renWx === "金" && diWx === "木") || (renWx === "木" && diWx === "金")) {
                    detailText = "從婚姻宮我們可以看出(金剋木)<br>1.你的緣分往往來自工作上或事業夥伴,因此建議可以往職場上尋找有共同理念的人.<br>2.或與另一半年紀相差大於5歲以上也很適合，但若另一半是年紀較小的,容易遇到長輩的阻礙,建議可以公證結婚減少阻礙<br>總結:<br>因此若找到職場上認識的以及年紀差大於5歲最好,若沒有則一也很好!";
                } else if ((renWx === "木" && diWx === "土") || (renWx === "土" && diWx === "木")) {
                    detailText = "從婚姻宮我們可以看出(木剋土)<br>1.你的緣分往往來自於人情,例如對方常常幫助你,使你欠對方人情,<br>2.若已經有不錯的對象,想踏入婚姻的人,較容易發生婚期拖延的現象,導致變卦<br>3.若已經結婚者或有對象,較容易長期聚少離多導致斷緣<br>總結:<br>若有不錯的對象建議早婚,經營上不能聚少離多,需要常常見面維繫感情";
                } else if ((renWx === "土" && diWx === "水") || (renWx === "水" && diWx === "土")) {
                    detailText = "從婚姻宮我們可以看出(土剋水)<br>1.你的緣分往往來自於才或財,意思是你的潛意識喜歡有才能或有錢財的另一半<br>2.容易因為對象太多導致難以選擇,因此不建議早婚,要慢慢挑選較好<br>總結:不建議早婚,慢慢挑選對象對您較好,除非已經遇到非常好的對象了";
                } else if ((renWx === "水" && diWx === "火") || (renWx === "火" && diWx === "水")) {
                    detailText = "從婚姻宮我們可以看出(水剋火)<br>1.你的緣分往往來自於瞬間接觸,較容易閃電結婚<br>2.容易找得太急,導致找錯人,因此容易閃電結婚也容易閃電離婚<br>總結:若確定遇到對的人,建議您可以閃電結婚,因婚姻宮水剋火的性質,若動作不快一點容易導致對象換人,錯失良緣";
                } else if ((renWx === "火" && diWx === "金") || (renWx === "金" && diWx === "火")) {
                    detailText = "從婚姻宮我們可以看出(火剋金)<br>1.你的緣分往往來自於最後認識者(結婚的那個)<br>總結:您結婚後就不容易離婚,若離婚緣分就斷了,因此不管任何原因千萬不能假離婚";
                }
                
                analysisHtml = `
                    <div class="analysis-text">
                        (若用姓名學專用的術語您的婚姻宮為剋宮,帶破象。<br>
                        進入婚姻前或過程中,容易有特殊狀況與波折,故稱為「破象」<br>
                        但不用因為看到破象就覺得不好或是緊張.只要能提早知道用對方法與好好經營,在感情上您也可以很順利。)<br><br>
                        (${detailText})
                    </div>
                `;
            } else if (marriageRel.type === "生" || marriageRel.type === "無") {
                const typeName = marriageRel.type === "無" ? "平" : "生";
                analysisHtml = `<div class="analysis-text" style="color: #888; font-weight: normal;">(此格局為${typeName}宮，相關分析內容即將推出，敬請期待。)</div>`;
            }

            analysisContent.innerHTML = analysisHtml;
            analysisBox.style.display = "block";
        }
    </script>
</body>
</html>
